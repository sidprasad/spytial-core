name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test -- --run --exclude tests/z3-equivalence.test.ts

  solver-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          BASE=${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          if git diff --name-only "$BASE"...HEAD | grep -qE \
            'src/layout/.*constraint|tests/.*z3|tests/helpers/.*oracle|tests/helpers/.*constraint'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.run == 'true'
        with:
          node-version: '20'

      - run: npm install
        if: steps.changes.outputs.run == 'true'

      - run: npx vitest run tests/z3-equivalence.test.ts
        if: steps.changes.outputs.run == 'true'

      - name: Skip (no relevant changes)
        if: steps.changes.outputs.run != 'true'
        run: echo "Skipping solver-oracle — no changes to constraint validator, oracle, or Z3 tests."
