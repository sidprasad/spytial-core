<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>spytial-core integration guide</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Integration guide for spytial-core, the host-agnostic engine behind Spytial.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <style>
    /* ─── Tufte-inspired theme for Docsify ─────────────────────────────── */

    html {
      font-size: 15px;
    }

    body {
      width: 87.5%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 0;
      background-color: #fffff8;
      color: #111;
      font-family: et-book, Palatino, "Palatino Linotype", "Palatino LT STD",
                   "Book Antiqua", Georgia, serif;
      font-size: 1.1rem;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      counter-reset: sidenote-counter;
    }

    /* ─── Layout ───────────────────────────────────────────────────────── */

    .sidebar {
      width: 14rem;
      padding: 1rem 1.5rem 2rem 0;
      background: transparent;
      border-right: none;
      box-shadow: none;
    }

    .sidebar > h1 {
      margin: 0 0 1rem 0;
      padding: 0;
    }

    .app-name-link {
      font-style: italic;
      font-size: 1.25rem;
      color: #111;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .sidebar-nav {
      padding: 0;
      line-height: 1.4;
    }

    .sidebar-nav ul {
      margin: 0 0 0.75rem 0;
      padding: 0;
    }

    .sidebar-nav li {
      margin: 0.15rem 0;
      list-style: none;
    }

    .sidebar-nav > ul > li > p,
    .sidebar-nav > ul > li > strong {
      font-style: italic;
      font-weight: normal;
      color: #555;
      font-size: 0.9rem;
      margin: 1rem 0 0.25rem 0;
      padding: 0;
      letter-spacing: 0.05em;
      text-transform: lowercase;
    }

    .sidebar-nav a {
      color: #111;
      text-decoration: none;
      border-bottom: none;
      font-size: 0.95rem;
    }

    .sidebar-nav a:hover {
      text-decoration: underline;
    }

    .sidebar-nav li.active > a {
      color: #b22222;
      font-style: italic;
      border-bottom: none;
    }

    .sidebar-toggle {
      background: transparent;
      border: none;
    }

    .sidebar-toggle span {
      background: #111;
    }

    /* ─── Content ──────────────────────────────────────────────────────── */

    .content {
      left: 16rem;
      top: 0;
      transition: none;
    }

    .markdown-section {
      max-width: 38rem;
      padding: 1rem 2rem 4rem 2rem;
      margin: 0;
    }

    .markdown-section p,
    .markdown-section li {
      font-size: 1.1rem;
      line-height: 1.55;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      font-weight: 400;
      font-style: italic;
      color: #111;
      letter-spacing: 0;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
      line-height: 1.25;
    }

    .markdown-section h1 {
      font-size: 2.4rem;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .markdown-section h2 {
      font-size: 1.6rem;
      margin-top: 2.5rem;
    }

    .markdown-section h3 {
      font-size: 1.25rem;
    }

    .markdown-section h2,
    .markdown-section h3 {
      border-bottom: none;
    }

    .markdown-section a {
      color: #111;
      text-decoration: none;
      background-image: linear-gradient(transparent 0, transparent calc(100% - 1px), #111 100%);
    }

    .markdown-section a:hover {
      color: #b22222;
      background-image: linear-gradient(transparent 0, transparent calc(100% - 1px), #b22222 100%);
    }

    .markdown-section strong { font-weight: 600; }
    .markdown-section em { font-style: italic; }

    .markdown-section blockquote {
      font-style: italic;
      color: #444;
      border-left: none;
      margin: 1.5rem 0 1.5rem 1.5rem;
      padding: 0;
      font-size: 1.05rem;
      background: transparent;
    }

    /* ─── Tables ───────────────────────────────────────────────────────── */

    .markdown-section table {
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.95rem;
      display: table;
      width: auto;
      max-width: 100%;
    }

    .markdown-section th,
    .markdown-section td {
      border: none;
      border-bottom: 1px solid #ddd;
      padding: 0.4rem 1rem 0.4rem 0;
      text-align: left;
      background: transparent;
    }

    .markdown-section th {
      border-bottom: 2px solid #111;
      font-weight: 600;
      font-style: normal;
      background: transparent;
    }

    .markdown-section tr:last-child td {
      border-bottom: 2px solid #111;
    }

    /* ─── Code ─────────────────────────────────────────────────────────── */

    .markdown-section code {
      font-family: Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: 0.85em;
      background: transparent;
      color: #111;
      padding: 0;
    }

    .markdown-section p code,
    .markdown-section li code,
    .markdown-section td code,
    .markdown-section h1 code,
    .markdown-section h2 code,
    .markdown-section h3 code {
      background: #f4f0e8;
      padding: 0.05em 0.3em;
      border-radius: 2px;
    }

    .markdown-section pre {
      background: #f4f0e8;
      border: none;
      border-radius: 0;
      padding: 0.8rem 1rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      line-height: 1.45;
      overflow-x: auto;
    }

    .markdown-section pre > code {
      background: transparent;
      font-size: 0.85rem;
      padding: 0;
    }

    /* ─── HR ───────────────────────────────────────────────────────────── */

    .markdown-section hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 2.5rem 0;
    }

    /* ─── Search ───────────────────────────────────────────────────────── */

    .search {
      margin: 0 0 1rem 0;
      padding: 0;
      border-bottom: none;
    }

    .search input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #999;
      font-family: inherit;
      font-size: 0.95rem;
      font-style: italic;
      padding: 0.25rem 0;
      width: 100%;
      box-shadow: none;
    }

    .search input:focus {
      border-bottom-color: #111;
      outline: none;
    }

    .search .matching-post {
      border-bottom: 1px dotted #ccc;
    }

    .search .clear-button {
      display: none;
    }

    /* ─── Copy code button ─────────────────────────────────────────────── */

    .docsify-copy-code-button {
      font-family: inherit;
      font-style: italic;
      font-size: 0.75rem;
      background: transparent !important;
      color: #777 !important;
      border: 1px solid #ccc;
      border-radius: 2px;
      padding: 0.1rem 0.5rem !important;
    }

    /* ─── Mobile ───────────────────────────────────────────────────────── */

    @media (max-width: 768px) {
      body {
        width: 92%;
        font-size: 1rem;
      }

      .sidebar {
        width: 14rem;
        padding-top: 3rem;
        background: #fffff8;
      }

      .content {
        left: 0;
      }

      .markdown-section {
        padding: 1rem;
      }

      .markdown-section h1 { font-size: 1.8rem; }
      .markdown-section h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'spytial-core',
      repo: 'https://github.com/sidprasad/spytial-core',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'getting-started.md',
      coverpage: false,
      search: {
        placeholder: 'search',
        noData: 'no results',
        depth: 3,
      },
      copyCode: { buttonText: 'copy', successText: 'copied' },
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
