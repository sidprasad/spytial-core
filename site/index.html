<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>spytial-core integration guide</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Integration guide for spytial-core, the host-agnostic engine behind Spytial.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/spytial-core@2.6.2/dist/components/react-component-integration.css">
  <style>
    .spytial-diagram {
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 0;
      margin: 1.2em 0;
      background: #fff;
      overflow: hidden;
    }
    .spytial-diagram webcola-cnd-graph,
    .spytial-diagram spytial-explorer { display: block; width: 100%; }
    .spytial-diagram .spytial-caption {
      display: block;
      padding: 6px 10px;
      font-size: 0.85em;
      color: #586069;
      background: #f6f8fa;
      border-top: 1px solid #e1e4e8;
    }
    .spytial-diagram .spytial-error {
      padding: 10px;
      color: #b00020;
      font-family: monospace;
      font-size: 0.85em;
      white-space: pre-wrap;
    }
    .spytial-diagram .spytial-conflict-mount {
      border-top: 1px solid #e1e4e8;
      padding: 8px;
      background: #fff;
    }
    .repl-vs-spytial {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
      margin: 1.4em 0;
    }
    .repl-vs-spytial > .pane > .pane-label {
      font-weight: 600;
      font-size: 0.85em;
      color: #586069;
      margin-bottom: 4px;
    }
    .repl-vs-spytial > .pane > pre {
      margin: 0;
      height: 100%;
      box-sizing: border-box;
    }
    .repl-vs-spytial > .pane > .spytial-diagram { margin: 0; }
    @media (max-width: 700px) {
      .repl-vs-spytial { grid-template-columns: 1fr; }
    }

    /* Refinement carousel */
    .spytial-carousel-wrap { margin: 1.4em 0; }
    .spytial-carousel {
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      padding: 0.15rem 0 0.5rem;
    }
    .spytial-carousel .step-card {
      flex: 0 0 100%;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      border: 1px solid #e3e3e3;
      border-radius: 5px;
      padding: 0.7rem 0.85rem 0.85rem;
      background: #fcfcfc;
      min-width: 0;
    }
    .spytial-carousel .step-card h3 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 600;
      color: #2b2b2b;
    }
    .spytial-carousel .step-card pre {
      margin: 0;
      font-size: 0.82em;
      line-height: 1.45;
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 4px;
      padding: 0.55em 0.7em;
      overflow-x: auto;
    }
    .spytial-carousel .step-pair {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 2rem minmax(0, 1fr);
      gap: 0.55rem;
      align-items: stretch;
    }
    .spytial-carousel .step-pair > .spytial-diagram { margin: 0; }
    .spytial-carousel .step-arrow {
      justify-self: center;
      align-self: center;
      font-size: 1.5rem;
      color: #666;
      line-height: 1;
    }
    @media (max-width: 720px) {
      .spytial-carousel .step-pair { grid-template-columns: 1fr; }
      .spytial-carousel .step-arrow { transform: rotate(90deg); }
    }
    .spytial-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .spytial-nav button {
      padding: 0.3rem 0.75rem;
      border: 1px solid #bbb;
      background: #f7f7f7;
      color: #111;
      cursor: pointer;
      font: inherit;
      font-size: 0.85em;
      border-radius: 4px;
    }
    .spytial-nav button:hover:not(:disabled) { background: #ececec; }
    .spytial-nav button:disabled {
      color: #999;
      border-color: #ddd;
      background: #fafafa;
      cursor: default;
    }
    .spytial-nav .spytial-nav-pos {
      font-size: 0.85em;
      color: #586069;
      min-width: 3em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // Docsify plugin: render <div class="spytial-diagram"> blocks as live Spytial diagrams.
    // Each block has a data source (<template class="data"> child OR data-data-ref="<id>")
    // and a spec source (<template class="spec"> child OR data-spec-ref="<id>").
    // Optional attributes: data-height, data-width, data-caption, data-accessible.
    function spytialDocsifyPlugin(hook) {
      let n = 0;
      hook.doneEach(function () {
        const tplTextById = function (id) {
          const el = document.getElementById(id);
          if (!el) return null;
          return (el.content ? el.content.textContent : el.textContent).trim();
        };
        const tplText = function (tpl) {
          if (tpl.content && tpl.content.textContent !== undefined) {
            return tpl.content.textContent.trim();
          }
          return tpl.textContent.trim();
        };

        const blocks = document.querySelectorAll('.spytial-diagram:not([data-spytial-rendered])');
        blocks.forEach(function (block) {
          block.setAttribute('data-spytial-rendered', '1');
          try {
            // Data source: <template class="data"> child, or data-data-ref="<id>".
            const dataRef = block.getAttribute('data-data-ref');
            let jsonText;
            if (dataRef) {
              jsonText = tplTextById(dataRef);
              if (jsonText == null) throw new Error('spytial-diagram data-data-ref="' + dataRef + '" not found');
            } else {
              const dataTpl = block.querySelector('template.data');
              if (!dataTpl) throw new Error('spytial-diagram needs <template class="data"> or data-data-ref');
              jsonText = tplText(dataTpl);
            }
            // Spec source: <template class="spec"> child, or data-spec-ref="<id>".
            const specRef = block.getAttribute('data-spec-ref');
            let yamlText;
            if (specRef) {
              yamlText = tplTextById(specRef);
              if (yamlText == null) throw new Error('spytial-diagram data-spec-ref="' + specRef + '" not found');
            } else {
              const specTpl = block.querySelector('template.spec');
              if (!specTpl) throw new Error('spytial-diagram needs <template class="spec"> or data-spec-ref');
              yamlText = tplText(specTpl);
            }
            const data = JSON.parse(jsonText);

            const height = block.getAttribute('data-height') || '260';
            const width = block.getAttribute('data-width') || '760';
            const caption = block.getAttribute('data-caption');
            const accessible = block.hasAttribute('data-accessible');

            const id = 'spytial-graph-' + (++n);
            const mountId = 'spytial-conflict-' + n;
            const tag = accessible ? 'spytial-explorer' : 'webcola-cnd-graph';
            const sizeStyle = 'style="display:block;width:100%;height:' + height + 'px;"';
            block.innerHTML =
              '<' + tag + ' id="' + id + '" width="' + width + '" height="' + height + '" ' + sizeStyle + '></' + tag + '>' +
              (caption ? '<span class="spytial-caption">' + caption + '</span>' : '') +
              '<div id="' + mountId + '" class="spytial-conflict-mount" style="display:none;"></div>';

            // Wait until the spytialcore bundle is available before rendering.
            const render = function () {
              const sc = window.spytialcore;
              if (!sc) { setTimeout(render, 50); return; }
              try {
                const instance  = new sc.JSONDataInstance(data);
                const layoutSpec = sc.parseLayoutSpec(yamlText);
                const evaluator  = new sc.SGraphQueryEvaluator();
                evaluator.initialize({ sourceData: instance });
                const result = new sc.LayoutInstance(layoutSpec, evaluator).generateLayout(instance);
                const layout = result && result.layout ? result.layout : result;
                const el = document.getElementById(id);
                el.renderLayout(layout);
                if (accessible && typeof el.enableAccessibility === 'function') {
                  el.enableAccessibility(layout, null, evaluator);
                }
                if (result && result.error) {
                  const mount = document.getElementById(mountId);
                  mount.style.display = '';
                  const mountModal = function () {
                    if (typeof window.mountErrorMessageModal !== 'function') {
                      setTimeout(mountModal, 50);
                      return;
                    }
                    window.mountErrorMessageModal(mountId);
                    const em = result.error.errorMessages;
                    if (result.error.type === 'hidden-node-conflict' && typeof window.showHiddenNodeConflict === 'function') {
                      window.showHiddenNodeConflict(em);
                    } else if (typeof window.showPositionalError === 'function') {
                      window.showPositionalError(em);
                    }
                  };
                  mountModal();
                }
              } catch (err) {
                console.error('spytial-diagram render error', err);
                block.innerHTML = '<div class="spytial-error">Render error: ' + (err && err.message || err) + '</div>';
              }
            };
            render();
          } catch (err) {
            console.error('spytial-diagram setup error', err);
            block.innerHTML = '<div class="spytial-error">Setup error: ' + (err && err.message || err) + '</div>';
          }
        });

        // Wire any unwired refinement carousels.
        document.querySelectorAll('.spytial-carousel-wrap:not([data-carousel-ready])').forEach(function (wrap) {
          wrap.setAttribute('data-carousel-ready', '1');
          const carousel = wrap.querySelector('.spytial-carousel');
          const cards = Array.prototype.slice.call(wrap.querySelectorAll('.step-card'));
          const buttons = Array.prototype.slice.call(wrap.querySelectorAll('.spytial-nav button'));
          const pos = wrap.querySelector('.spytial-nav-pos');
          if (!carousel || !cards.length || !buttons.length) return;

          function currentCardIndex() {
            const left = carousel.scrollLeft;
            const base = cards[0].offsetLeft;
            let best = 0, bestDist = Infinity;
            cards.forEach(function (c, i) {
              const dist = Math.abs((c.offsetLeft - base) - left);
              if (dist < bestDist) { bestDist = dist; best = i; }
            });
            return best;
          }

          function updateNav() {
            const current = currentCardIndex();
            buttons.forEach(function (btn) {
              const dir = parseInt(btn.getAttribute('data-dir'), 10);
              btn.disabled = (current + dir < 0) || (current + dir >= cards.length);
            });
            if (pos) pos.textContent = (current + 1) + ' / ' + cards.length;
          }

          buttons.forEach(function (btn) {
            btn.addEventListener('click', function () {
              const dir = parseInt(btn.getAttribute('data-dir'), 10);
              const target = cards[currentCardIndex() + dir];
              if (target) target.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
            });
          });

          carousel.addEventListener('scroll', updateNav);
          updateNav();
        });
      });
    }

    window.$docsify = {
      name: 'spytial-core',
      repo: 'https://github.com/sidprasad/spytial-core',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'getting-started.md',
      search: {
        placeholder: 'Search',
        noData: 'No results.',
        depth: 3,
      },
      copyCode: { buttonText: 'Copy', successText: 'Copied' },
      plugins: [spytialDocsifyPlugin],
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>

  <!-- spytial-core bundle: registers <webcola-cnd-graph>. NOTE: @4 URLs resolve
       once 4.0.0 is published to npm — deploy this page after publishing. -->
  <script src="https://cdn.jsdelivr.net/npm/spytial-core@4/dist/browser/spytial-core-complete.global.js"></script>
  <!-- Opt-in a11y explorer (4.0.0+): registers <spytial-explorer>. -->
  <script src="https://cdn.jsdelivr.net/npm/spytial-core@4/dist/browser/spytial-core-explorer.global.js"></script>
  <!-- React component integration: exposes window.mountErrorMessageModal / showPositionalError / showHiddenNodeConflict / clearAllErrors. -->
  <script src="https://cdn.jsdelivr.net/npm/spytial-core@4/dist/components/react-component-integration.global.js"></script>
</body>
</html>
